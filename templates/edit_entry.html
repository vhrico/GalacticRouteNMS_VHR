{% extends "base.html" %}

{% block title %}Edit Entry - Galactic Route NMS{% endblock %}

{% block content %}
<div style="max-width: 700px; margin: 0 auto;">
    <h1>Edit Journal Entry</h1>
    <p>Last updated: {{ entry.updated_at.strftime('%Y-%m-%d %H:%M:%S') }}</p>

    <form method="POST" class="card" style="margin-top: 2rem;">
        <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" required value="{{ entry.title }}">
        </div>

        <div class="form-group">
            <label for="system_id">Associated System</label>
            <select id="system_id" name="system_id">
                <option value="">No specific system</option>
                {% for system in systems %}
                    <option value="{{ system.id }}" {% if entry.system_id == system.id %}selected{% endif %}>{{ system.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="content">Entry Content *</label>
            <textarea id="content" name="content" required>{{ entry.content }}</textarea>
        </div>

        <div class="form-group">
            <label for="tags">Tags</label>
            <input type="text" id="tags" name="tags" value="{{ entry.tags }}" placeholder="e.g., Discovery, Landmark, Resource, Creature (comma-separated)">
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
            <button type="submit" class="btn">Update Entry</button>
            <a href="{{ url_for('view_journal') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
