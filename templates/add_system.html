{% extends "base.html" %}

{% block title %}Add System - Galactic Route NMS{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <h1>Add New System</h1>
    <p>Manually add a discovered system to your map</p>

    <form method="POST" enctype="multipart/form-data" class="card">
        <div class="form-group">
            <label for="name">System Name *</label>
            <input type="text" id="name" name="name" required placeholder="e.g., Euclid Alpha-7">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="x">X Coordinate *</label>
                <input type="number" id="x" name="x" required step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label for="y">Y Coordinate *</label>
                <input type="number" id="y" name="y" required step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label for="z">Z Coordinate *</label>
                <input type="number" id="z" name="z" required step="0.01" placeholder="0.00">
            </div>
        </div>

        <div class="form-group">
            <label for="galaxy_address">Galaxy Address</label>
            <input type="text" id="galaxy_address" name="galaxy_address" placeholder="e.g., 0F82:0FFF:0FF7:00EB">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="system_type">System Type</label>
                <select id="system_type" name="system_type">
                    <option value="">Select...</option>
                    <option value="Yellow Star">Yellow Star</option>
                    <option value="Red Star">Red Star</option>
                    <option value="Blue Star">Blue Star</option>
                    <option value="Green Star">Green Star</option>
                    <option value="Exotic">Exotic</option>
                    <option value="Binary">Binary</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="star_type">Star Type</label>
                <input type="text" id="star_type" name="star_type" placeholder="e.g., G, K, M">
            </div>
        </div>

        <div class="form-group">
            <label for="planets_count">Number of Planets</label>
            <input type="number" id="planets_count" name="planets_count" min="0" max="6" placeholder="0">
        </div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" placeholder="Add any observations or notes about this system..."></textarea>
        </div>

        <div class="form-group">
            <label for="image">System Image</label>
            <input type="file" id="image" name="image" accept="image/png,image/jpeg,image/gif,image/webp">
        </div>

        <div class="form-group">
            <label for="image_caption">Image Caption</label>
            <input type="text" id="image_caption" name="image_caption" placeholder="Screenshot, portal glyph view, planet surface...">
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
            <button type="submit" class="btn">Add System</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
